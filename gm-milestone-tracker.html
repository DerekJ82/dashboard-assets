
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Milestone Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
  }

  .slide-container {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg, #87CEEB 0%, #b0e0f5 42%, #7ec850 42%, #5a9e35 100%);
    position: relative;
    overflow: hidden;
  }

  /* Clouds */
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud1 { width: 120px; height: 40px; top: 8%; left: -140px; animation: cloudLoop 60s linear infinite; }
  .cloud1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
  .cloud1::after  { width: 45px; height: 45px; top: -20px; left: 50px; }
  .cloud2 { width: 90px; height: 30px; top: 18%; left: -110px; animation: cloudLoop 80s linear infinite 20s; }
  .cloud2::before { width: 45px; height: 45px; top: -22px; left: 10px; }
  .cloud2::after  { width: 35px; height: 35px; top: -15px; left: 40px; }
  .cloud3 { width: 100px; height: 35px; top: 6%; left: -120px; animation: cloudLoop 70s linear infinite 40s; }
  .cloud3::before { width: 50px; height: 50px; top: -25px; left: 12px; }
  .cloud3::after  { width: 40px; height: 40px; top: -18px; left: 45px; }
  .cloud4 { width: 80px; height: 28px; top: 14%; left: -100px; animation: cloudLoop 90s linear infinite 10s; }
  .cloud4::before { width: 40px; height: 40px; top: -20px; left: 8px; }
  .cloud4::after  { width: 30px; height: 30px; top: -14px; left: 35px; }

  @keyframes cloudLoop {
    0%   { transform: translateX(0); }
    100% { transform: translateX(110vw); }
  }

  /* Road */
  .road {
    position: absolute;
    bottom: 22%; left: 0;
    width: 100%; height: 80px;
    background: #2A2C2E;
    z-index: 2;
  }
  .road-line {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 100%; height: 6px;
    background: repeating-linear-gradient(90deg, #f0c040 0px, #f0c040 60px, transparent 60px, transparent 120px);
  }

  /* Warehouse */
  .warehouse {
    position: absolute;
    bottom: calc(22% + 80px);
    left: 20px; width: 160px;
    z-index: 3;
  }
  .warehouse-building {
    width: 160px; height: 100px;
    background: #4B286D;
    border-radius: 4px 4px 0 0;
    position: relative;
  }
  .warehouse-roof {
    width: 0; height: 0;
    border-left: 80px solid transparent;
    border-right: 80px solid transparent;
    border-bottom: 30px solid #3a1d54;
    position: absolute;
    top: -30px; left: 0;
  }
  .warehouse-door {
    width: 50px; height: 55px;
    background: #1a0a2e;
    position: absolute;
    bottom: 0; left: 55px;
    border-radius: 3px 3px 0 0;
  }
  .warehouse-window {
    width: 30px; height: 25px;
    background: #87CEEB;
    border: 2px solid #3a1d54;
    position: absolute; top: 20px;
  }
  .warehouse-window.left  { left: 15px; }
  .warehouse-window.right { right: 15px; }
  .warehouse-label {
    text-align: center; color: white;
    font-size: 11px; font-weight: bold;
    background: #2A2C2E;
    padding: 3px 6px; border-radius: 3px;
    margin-top: 4px;
  }

  /* Truck + Trailer */
  .truck-wrapper {
    position: absolute;
    bottom: calc(22% + 80px);
    z-index: 10;
    display: flex;
    align-items: flex-end;
    animation: truckDrive 5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  @keyframes truckDrive {
    0%   { left: 5%; }
    85%  { left: 43%; }
    92%  { left: 41.5%; }
    100% { left: 42%; }
  }

  .trailer {
    width: 110px; height: 60px;
    position: relative;
    margin-right: 4px;
  }
  .trailer-body {
    width: 110px; height: 48px;
    background: #4B286D;
    border-radius: 4px 4px 0 0;
    position: absolute;
    bottom: 18px; left: 0;
    border: 2px solid #6b3d9e;
  }
  .trailer-hitch {
    width: 14px; height: 6px;
    background: #555;
    position: absolute;
    right: -14px; bottom: 22px;
    z-index: 1;
  }
  .trailer-wheel {
    width: 20px; height: 20px;
    background: #1a1a1a;
    border-radius: 50%;
    border: 3px solid #555;
    position: absolute; bottom: -4px;
    animation: wheelSpin 0.5s linear infinite;
  }
  .trailer-wheel::after {
    content: '';
    width: 7px; height: 7px;
    background: #888; border-radius: 50%;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .trailer-wheel-left  { left: 12px; }
  .trailer-wheel-right { right: 12px; }

  .trailer-person-bubble {
    position: absolute;
    top: -44px; left: 50%;
    transform: translateX(-50%);
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 3px solid white;
    overflow: hidden;
    background: #b8e0ff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    z-index: 20;
  }
  .trailer-person-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 8px solid white;
  }
  .trailer-person-bubble img {
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
  }

  .truck {
    width: 120px; height: 65px;
    position: relative;
  }
  .truck-body {
    width: 80px; height: 45px;
    background: #00A400;
    position: absolute;
    bottom: 18px; right: 0;
    border-radius: 4px 4px 0 0;
  }
  .truck-cab {
    width: 50px; height: 38px;
    background: #008000;
    position: absolute;
    bottom: 18px; left: 0;
    border-radius: 6px 0 0 0;
    overflow: visible;
  }
  .driver-bubble {
    position: absolute;
    top: -42px; left: 4px;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 3px solid white;
    overflow: hidden;
    background: #b8e0ff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    z-index: 20;
  }
  .driver-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 8px solid white;
  }
  .driver-bubble img {
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
  }
  .truck-cab-window {
    width: 28px; height: 22px;
    background: #b8e0ff;
    position: absolute;
    top: 4px; left: 6px;
    border-radius: 4px 0 0 0;
    border: 2px solid #005500;
  }
  .truck-wheel {
    width: 22px; height: 22px;
    background: #1a1a1a;
    border-radius: 50%;
    border: 3px solid #555;
    position: absolute; bottom: -4px;
    animation: wheelSpin 0.5s linear infinite;
  }
  .truck-wheel::after {
    content: '';
    width: 8px; height: 8px;
    background: #888; border-radius: 50%;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .wheel-front { right: 8px; }
  .wheel-back  { left: 8px; }

  @keyframes wheelSpin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .truck-logo {
    position: absolute;
    top: 8px; right: 10px;
    color: white; font-size: 10px; font-weight: bold;
    background: #003399;
    padding: 2px 5px; border-radius: 3px;
  }

  .exhaust {
    position: absolute;
    bottom: 30px; left: -10px;
    z-index: 9;
  }
  .puff {
    width: 14px; height: 14px;
    background: rgba(200,200,200,0.7);
    border-radius: 50%;
    position: absolute;
    animation: puffAway 1s ease-out infinite;
  }
  .puff:nth-child(2) { animation-delay: 0.3s; width: 10px; height: 10px; }
  .puff:nth-child(3) { animation-delay: 0.6s; width: 8px; height: 8px; }
  @keyframes puffAway {
    0%   { opacity: 0.8; transform: translateX(0) translateY(0) scale(1); }
    100% { opacity: 0; transform: translateX(-30px) translateY(-15px) scale(2); }
  }

  /* ===== MILESTONE MARKERS ===== */
  .milestone {
    position: absolute;
    bottom: calc(22% + 80px);
    z-index: 5;
    text-align: center;
    transform: translateX(-50%);
  }
  .milestone-pole {
    width: 4px; height: 60px;
    background: #2A2C2E;
    margin: 0 auto;
  }
  .milestone-sign {
    padding: 5px 10px;
    border-radius: 6px;
    font-weight: bold; font-size: 13px;
    white-space: nowrap;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  }
  .milestone-sub {
    font-size: 10px;
    font-weight: normal;
    opacity: 0.85;
    margin-top: 2px;
    display: block;
  }

  /* Year milestones */
  .milestone-year .milestone-pole {
    height: 40px;
    background: #555;
  }
  .milestone-year .milestone-sign {
    background: rgba(42,44,46,0.88);
    color: white;
    border: 1.5px solid #888;
    font-size: 11px;
    padding: 4px 8px;
  }

  .milestone-2023 { left: 13%; }
  .milestone-2024 { left: 24%; }
  .milestone-2025 { left: 35%; }

  /* 378K current */
  .milestone-378 { left: 58%; }
  .milestone-378 .milestone-sign {
    background: #4B286D; color: white;
    border: 2px solid #6b3d9e;
    font-size: 14px;
  }

  /* 500K banner */
  .milestone-500 { left: 88%; }
  .milestone-500 .milestone-sign {
    background: #00A400; color: white;
    border: 2px solid #00cc00;
    font-size: 15px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 3px 8px rgba(0,164,0,0.4); }
    50%       { transform: scale(1.08); box-shadow: 0 5px 16px rgba(0,164,0,0.7); }
  }

  /* ===== WEATHER ZONES — moved much higher ===== */
  .weather-zone {
    position: absolute;
    z-index: 6;
    pointer-events: none;
  }

  /* Dark rain cloud */
  .rain-cloud {
    position: absolute;
    background: #555;
    border-radius: 50px;
    opacity: 0.9;
  }
  .rain-cloud::before, .rain-cloud::after {
    content: '';
    position: absolute;
    background: #555;
    border-radius: 50%;
  }

  /* Rain drops */
  .rain-drop {
    position: absolute;
    width: 2px;
    background: linear-gradient(to bottom, transparent, #6ab0d4);
    border-radius: 2px;
    animation: rainFall 0.8s linear infinite;
    opacity: 0.7;
  }
  @keyframes rainFall {
    0%   { transform: translateY(-10px); opacity: 0.7; }
    100% { transform: translateY(40px); opacity: 0; }
  }

  /* 2023 weather - heavy rain — pushed HIGH into sky */
  .weather-2023 {
    left: calc(13% - 50px);
    bottom: calc(42% + 60px);
    width: 100px;
  }
  .weather-2023 .rain-cloud {
    width: 90px; height: 28px;
    top: 0; left: 5px;
  }
  .weather-2023 .rain-cloud::before { width: 44px; height: 44px; top: -22px; left: 8px; }
  .weather-2023 .rain-cloud::after  { width: 36px; height: 36px; top: -18px; left: 38px; }

  /* 2024 weather - moderate rain — pushed HIGH */
  .weather-2024 {
    left: calc(24% - 50px);
    bottom: calc(42% + 60px);
    width: 100px;
  }
  .weather-2024 .rain-cloud {
    width: 80px; height: 25px;
    top: 0; left: 10px;
    background: #666;
  }
  .weather-2024 .rain-cloud::before { width: 38px; height: 38px; top: -19px; left: 8px; background: #666; }
  .weather-2024 .rain-cloud::after  { width: 30px; height: 30px; top: -15px; left: 35px; background: #666; }

  /* 2025 weather - partly sunny — pushed HIGH */
  .weather-2025 {
    left: calc(35% - 50px);
    bottom: calc(42% + 55px);
    width: 110px;
  }
  .partly-cloud {
    position: absolute;
    background: #bbb;
    border-radius: 50px;
    width: 65px; height: 22px;
    top: 8px; left: 30px;
  }
  .partly-cloud::before {
    content: '';
    position: absolute;
    background: #bbb;
    border-radius: 50%;
    width: 32px; height: 32px;
    top: -16px; left: 6px;
  }
  .partly-cloud::after {
    content: '';
    position: absolute;
    background: #bbb;
    border-radius: 50%;
    width: 26px; height: 26px;
    top: -13px; left: 28px;
  }
  .small-sun {
    position: absolute;
    width: 28px; height: 28px;
    background: #f0c040;
    border-radius: 50%;
    top: 0; left: 2px;
    box-shadow: 0 0 8px 3px rgba(240,192,64,0.5);
    animation: sunGlow 2s ease-in-out infinite alternate;
  }
  @keyframes sunGlow {
    0%   { box-shadow: 0 0 8px 3px rgba(240,192,64,0.4); }
    100% { box-shadow: 0 0 14px 6px rgba(240,192,64,0.7); }
  }

  /* 2026 weather - bright sun — pushed HIGH */
  .weather-2026 {
    left: calc(58% - 30px);
    bottom: calc(42% + 80px);
    width: 80px;
  }
  .big-sun {
    position: absolute;
    width: 44px; height: 44px;
    background: radial-gradient(circle, #ffe066, #f0c040);
    border-radius: 50%;
    top: 0; left: 18px;
    box-shadow: 0 0 18px 8px rgba(240,192,64,0.6);
    animation: bigSunGlow 1.8s ease-in-out infinite alternate;
  }
  @keyframes bigSunGlow {
    0%   { box-shadow: 0 0 18px 8px rgba(240,192,64,0.5); transform: scale(1); }
    100% { box-shadow: 0 0 28px 14px rgba(240,192,64,0.8); transform: scale(1.06); }
  }

  /* Party zone */
  .party-zone {
    position: absolute;
    bottom: calc(22% + 80px);
    left: 74%;
    width: 260px;
    z-index: 4;
  }
  .balloon {
    position: absolute;
    border-radius: 50%;
    animation: balloonFloat 2s ease-in-out infinite alternate;
  }
  .balloon::after {
    content: '';
    position: absolute;
    bottom: -12px; left: 50%;
    transform: translateX(-50%);
    width: 1px; height: 12px;
    background: #555;
  }
  .b1 { width: 28px; height: 32px; background: #4B286D; left: 10px;  bottom: 10px; animation-delay: 0s; }
  .b2 { width: 24px; height: 28px; background: #00A400; left: 55px;  bottom: 20px; animation-delay: 0.4s; }
  .b3 { width: 26px; height: 30px; background: #f0c040; left: 110px; bottom: 12px; animation-delay: 0.8s; }
  .b4 { width: 22px; height: 26px; background: #e84393; left: 175px; bottom: 18px; animation-delay: 0.2s; }
  .b5 { width: 25px; height: 29px; background: #00A400; left: 225px; bottom: 10px; animation-delay: 0.6s; }
  @keyframes balloonFloat {
    0%   { transform: translateY(0) rotate(-3deg); }
    100% { transform: translateY(-14px) rotate(3deg); }
  }
  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall 2.5s ease-in infinite;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(120px) rotate(720deg); opacity: 0; }
  }
  .sparkle {
    position: absolute;
    font-size: 18px;
    animation: sparkleAnim 1.2s ease-in-out infinite alternate;
  }
  @keyframes sparkleAnim {
    0%   { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
    100% { opacity: 1; transform: scale(1.2) rotate(20deg); }
  }

  /* Dancing Stick Figures */
  .dancer-wrapper {
    position: absolute;
    bottom: calc(42% + 20px);
    z-index: 8;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .dancer-wrapper.dancer1 {
    left: 80%;
    animation: danceBounce1 0.55s ease-in-out infinite alternate;
  }
  .dancer-wrapper.dancer2 {
    left: 87%;
    animation: danceBounce2 0.65s ease-in-out infinite alternate;
    animation-delay: 0.2s;
  }
  @keyframes danceBounce1 {
    0%   { transform: translateY(0) rotate(-5deg); }
    100% { transform: translateY(-12px) rotate(5deg); }
  }
  @keyframes danceBounce2 {
    0%   { transform: translateY(-6px) rotate(4deg); }
    100% { transform: translateY(6px) rotate(-4deg); }
  }
  .dancer-head {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 3px solid white;
    overflow: hidden;
    background: #b8e0ff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 2px;
    flex-shrink: 0;
  }
  .dancer-head img {
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
  }
  .stick-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .stick-torso {
    width: 3px; height: 32px;
    background: #2A2C2E;
    border-radius: 2px;
  }
  .stick-arms {
    position: absolute;
    top: 4px;
    width: 60px; height: 3px;
    left: 50%; transform: translateX(-50%);
  }
  .dancer1 .stick-arms { animation: armWave1 0.55s ease-in-out infinite alternate; }
  .dancer2 .stick-arms { animation: armWave2 0.65s ease-in-out infinite alternate; animation-delay: 0.15s; }
  @keyframes armWave1 {
    0%   { transform: translateX(-50%) rotate(-40deg); }
    100% { transform: translateX(-50%) rotate(40deg); }
  }
  @keyframes armWave2 {
    0%   { transform: translateX(-50%) rotate(35deg); }
    100% { transform: translateX(-50%) rotate(-35deg); }
  }
  .stick-arm-left {
    position: absolute; left: 0; top: 0;
    width: 27px; height: 3px;
    background: #2A2C2E; border-radius: 2px;
    transform-origin: right center;
  }
  .stick-arm-right {
    position: absolute; right: 0; top: 0;
    width: 27px; height: 3px;
    background: #2A2C2E; border-radius: 2px;
    transform-origin: left center;
  }
  .stick-legs {
    position: relative;
    width: 44px; height: 34px;
  }
  .stick-leg-left {
    position: absolute; left: 9px; top: 0;
    width: 3px; height: 32px;
    background: #2A2C2E; border-radius: 2px;
    transform-origin: top center;
  }
  .stick-leg-right {
    position: absolute; right: 9px; top: 0;
    width: 3px; height: 32px;
    background: #2A2C2E; border-radius: 2px;
    transform-origin: top center;
  }
  .dancer1 .stick-leg-left  { animation: legLeft1  0.55s ease-in-out infinite alternate; }
  .dancer1 .stick-leg-right { animation: legRight1 0.55s ease-in-out infinite alternate; }
  .dancer2 .stick-leg-left  { animation: legLeft2  0.65s ease-in-out infinite alternate; animation-delay: 0.1s; }
  .dancer2 .stick-leg-right { animation: legRight2 0.65s ease-in-out infinite alternate; animation-delay: 0.1s; }
  @keyframes legLeft1  { 0% { transform: rotate(-30deg); } 100% { transform: rotate(30deg); } }
  @keyframes legRight1 { 0% { transform: rotate(30deg);  } 100% { transform: rotate(-30deg); } }
  @keyframes legLeft2  { 0% { transform: rotate(28deg);  } 100% { transform: rotate(-28deg); } }
  @keyframes legRight2 { 0% { transform: rotate(-28deg); } 100% { transform: rotate(28deg); } }

  /* Progress bar */
  .progress-bar-container {
    position: absolute;
    bottom: 8%; left: 5%;
    width: 90%; z-index: 10;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    color: white; font-size: 13px; font-weight: bold;
    margin-bottom: 6px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  }
  .progress-track {
    width: 100%; height: 22px;
    background: rgba(255,255,255,0.2);
    border-radius: 11px;
    border: 2px solid rgba(255,255,255,0.4);
    overflow: hidden; position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4B286D, #00A400);
    border-radius: 11px;
    width: 0%;
    animation: fillBar 3s ease-out 1s forwards;
    position: relative;
  }
  @keyframes fillBar {
    0%   { width: 0%; }
    100% { width: 75.6%; }
  }
  .progress-fill::after {
    content: '378K';
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    color: white; font-size: 11px; font-weight: bold;
  }
  .progress-pct {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    color: #2A2C2E; font-size: 11px; font-weight: bold;
  }

  /* Title */
  .title-banner {
    position: absolute;
    top: 3%; left: 50%;
    transform: translateX(-50%);
    text-align: center; z-index: 20;
  }
  .title-banner h1 {
    color: #4B286D; font-size: 22px; font-weight: 900;
    text-shadow: 2px 2px 0 white, -1px -1px 0 white, 1px -1px 0 white, -1px 1px 0 white;
    letter-spacing: 1px; white-space: nowrap;
  }
  .title-banner p {
    color: #2A2C2E; font-size: 13px; font-weight: bold;
    text-shadow: 1px 1px 0 white;
  }

  /* Trees */
  .tree {
    position: absolute;
    bottom: calc(22% + 80px);
    z-index: 3;
  }
  .tree-trunk { width: 10px; height: 20px; background: #8B4513; margin: 0 auto; }
  .tree-top   { width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-bottom: 35px solid #228B22; margin: 0 auto; }

  /* Editable milestone number */
  .editable-num {
    cursor: pointer;
    border-bottom: 1px dashed rgba(255,255,255,0.6);
    min-width: 36px;
    display: inline-block;
    text-align: center;
    transition: background 0.2s;
  }
  .editable-num:hover {
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
  }

  /* Edit modal */
  .edit-modal {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #2A2C2E;
    color: white;
    padding: 20px 24px;
    border-radius: 10px;
    z-index: 100;
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    min-width: 220px;
    text-align: center;
  }
  .edit-modal h3 { margin-bottom: 12px; font-size: 15px; color: #00A400; }
  .edit-modal input {
    width: 100%; padding: 8px 10px;
    border-radius: 6px; border: 2px solid #4B286D;
    background: #1a1a2e; color: white;
    font-size: 16px; text-align: center;
    margin-bottom: 12px;
    outline: none;
  }
  .edit-modal input:focus { border-color: #00A400; }
  .modal-btns { display: flex; gap: 8px; justify-content: center; }
  .modal-btns button {
    padding: 7px 18px;
    border: none; border-radius: 6px;
    font-weight: bold; cursor: pointer;
    font-size: 13px;
  }
  .btn-save { background: #00A400; color: white; }
  .btn-save:hover { background: #007a00; }
  .btn-cancel { background: #555; color: white; }
  .btn-cancel:hover { background: #333; }
</style>
</head>
<body>

  <!-- Truck + Trailer -->
  <div class="truck-wrapper" id="truckWrapper">

        <div class="driver-bubble" id="driverBubble">

  <!-- 378K Current Milestone -->
  <div class="milestone milestone-378">

      <span class="milestone-sub" id="currentDate">Apr 2026</span>

  <div class="party-zone">

    <div class="balloon b3"></div>
    <div class="balloon b4"></div>
    <div class="balloon b5"></div>
    <div class="confetti-piece" style="background:#4B286D; left:20px;  animation-delay:0s;   animation-duration:2s;"></div>
    <div class="confetti-piece" style="background:#00A400; left:55px;  animation-delay:0.5s; animation-duration:2.3s;"></div>
    <div class="confetti-piece" style="background:#f0c040; left:90px;  animation-delay:1s;   animation-duration:1.8s;"></div>
    <div class="confetti-piece" style="background:#e84393; left:130px; animation-delay:0.3s; animation-duration:2.5s;"></div>
    <div class="confetti-piece" style="background:#00A400; left:170px; animation-delay:0.8s; animation-duration:2.1s;"></div>
    <div class="confetti-piece" style="background:#4B286D; left:210px; animation-delay:1.2s; animation-duration:1.9s;"></div>
    <div class="confetti-piece" style="background:#f0c040; left:240px; animation-delay:0.6s; animation-duration:2.2s;"></div>
    <div class="sparkle" style="left: 30px;  bottom: 55px; animation-delay: 0s;">⭐</div>
    <div class="sparkle" style="left: 120px; bottom: 65px; animation-delay: 0.4s;">✨</div>
    <div class="sparkle" style="left: 230px; bottom: 55px; animation-delay: 0.8s;">🌟</div>
  </div>

  <!-- Dancer 1 -->
  <div class="dancer-wrapper dancer1" id="dancerWrapper1">

      <span id="dancer1Placeholder" style="font-size:22px;">🕺</span>
      <img id="dancer1Img" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%;" alt="Dancer 1" />

    <div class="stick-body">
      <div class="stick-torso"></div>
      <div class="stick-arms">
        <div class="stick-arm-left"></div>

  <!-- Dancer 2 -->
  <div class="dancer-wrapper dancer2" id="dancerWrapper2">

      <span id="dancer2Placeholder" style="font-size:22px;">💃</span>
      <img id="dancer2Img" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%;" alt="Dancer 2" />
    </div>
    <div class="stick-body">
      <div class="stick-torso"></div>
      <div class="stick-arms">
        <div class="stick-arm-left"></div>

  <!-- Progress Bar -->
  <div class="progress-bar-container">
    <div class="progress-label">
      <span>🏭 GM Warehouse</span>

<!-- Edit Modal -->
<div class="edit-modal" id="editModal">
  <h3 id="modalTitle">Enter number</h3>
  <input type="text" id="modalInput" placeholder="e.g. 250" maxlength="6" />
  <div class="modal-btns">
    <button class="btn-save" id="modalSave">✅ Save</button>
    <button class="btn-cancel" id="modalCancel">✖ Cancel</button>
  </div>
</div>

<script>
  // ===== PHOTOS =====
  const driverPhotoUrl = 'https://firebasestorage.googleapis.com/v0/b/cdo-fuelix-app-pr-5c588b.appspot.com/o/users%2Fuser-Zx1alcPZwjfXu50r3ZBB%2Ffile-cWBjlOU27TnLljbbNh3C?alt=media&token=756a73e0-de11-486e-b819-60bf9fda5f09';
  const driverImg = document.getElementById('driverImg');
  const driverPlaceholder = document.getElementById('driverPlaceholder');
  driverImg.onload  = () => { driverPlaceholder.style.display = 'none'; driverImg.style.display = 'block'; };
  driverImg.onerror = () => { driverPlaceholder.innerHTML = '😊'; };
  driverImg.src = driverPhotoUrl;

  const trailerPhotoUrl = 'https://firebasestorage.googleapis.com/v0/b/cdo-fuelix-app-pr-5c588b.appspot.com/o/users%2Fuser-Zx1alcPZwjfXu50r3ZBB%2Ffile-Draa8xxHpsWWErEuBsXL?alt=media&token=ca1bae33-d96c-4964-b648-03f5ca83cb40';
  const trailerImg = document.getElementById('trailerImg');
  const trailerPlaceholder = document.getElementById('trailerPlaceholder');
  trailerImg.onload  = () => { trailerPlaceholder.style.display = 'none'; trailerImg.style.display = 'block'; };
  trailerImg.onerror = () => { trailerPlaceholder.innerHTML = '😊'; };
  trailerImg.src = trailerPhotoUrl;

  const dancer1PhotoUrl = 'https://firebasestorage.googleapis.com/v0/b/cdo-fuelix-app-pr-5c588b.appspot.com/o/users%2Fuser-Zx1alcPZwjfXu50r3ZBB%2Ffile-PAlaKgDQhQEYPv8JTsMI?alt=media&token=050db376-02ac-4751-b799-de8a078dd9ed';
  const dancer1Img = document.getElementById('dancer1Img');
  const dancer1Placeholder = document.getElementById('dancer1Placeholder');
  dancer1Img.onload  = () => { dancer1Placeholder.style.display = 'none'; dancer1Img.style.display = 'block'; };
  dancer1Img.onerror = () => { dancer1Placeholder.innerHTML = '🕺'; };
  dancer1Img.src = dancer1PhotoUrl;

  const dancer2PhotoUrl = 'https://firebasestorage.googleapis.com/v0/b/cdo-fuelix-app-pr-5c588b.appspot.com/o/users%2Fuser-Zx1alcPZwjfXu50r3ZBB%2Ffile-pE0SDY7YwSZYcGH7ymI8?alt=media&token=cc9acae5-6d4e-4605-b089-f8ab9a91c3fc';
  const dancer2Img = document.getElementById('dancer2Img');
  const dancer2Placeholder = document.getElementById('dancer2Placeholder');
  dancer2Img.onload  = () => { dancer2Placeholder.style.display = 'none'; dancer2Img.style.display = 'block'; };
  dancer2Img.onerror = () => { dancer2Placeholder.innerHTML = '💃'; };
  dancer2Img.src = dancer2PhotoUrl;

  // ===== STOP WHEELS =====
  const wheels  = document.querySelectorAll('.truck-wheel, .trailer-wheel');
  const exhaust = document.getElementById('exhaust');
  setTimeout(() => {
    wheels.forEach(w => { w.style.animationPlayState = 'paused'; });
    if (exhaust) exhaust.style.display = 'none';
  }, 5000);

  // ===== SUN RAYS =====
  function addRays(sunEl, count, length, color) {
    const size = parseInt(sunEl.style.width) || 44;
    for (let i = 0; i < count; i++) {
      const ray = document.createElement('div');
      const angle = i * (360 / count);
      ray.style.cssText = `
        position: absolute;
        width: 3px;
        height: ${length}px;
        background: linear-gradient(to top, ${color}, transparent);
        border-radius: 2px;
        top: 50%; left: 50%;
        transform-origin: 0 0;
        transform: rotate(${angle}deg) translateY(-${size / 2 + 5}px);
      `;
      sunEl.appendChild(ray);
    }
  }

  const sun2025 = document.getElementById('sun2025');
  addRays(sun2025, 6, 10, '#f0c040');

  const sun2026 = document.getElementById('sun2026');
  addRays(sun2026, 8, 14, '#f0c040');

  // ===== EDITABLE MILESTONE NUMBERS =====
  let activeEl = null;
  const modal = document.getElementById('editModal');
  const modalInput = document.getElementById('modalInput');
  const modalTitle = document.getElementById('modalTitle');

  document.querySelectorAll('.editable-num').forEach(el => {
    el.addEventListener('click', () => {
      activeEl = el;
      const year = el.dataset.year;
      const current = el.textContent.replace('K', '').trim();
      modalTitle.textContent = `Enter units for ${year} (e.g. 250):`;
      modalInput.value = current === '___' ? '' : current;
      modal.style.display = 'block';
      setTimeout(() => modalInput.focus(), 50);
    });
  });

  document.getElementById('modalSave').addEventListener('click', () => {
    if (activeEl && modalInput.value.trim() !== '') {
      activeEl.textContent = modalInput.value.trim() + 'K';
    }
    modal.style.display = 'none';
    activeEl = null;
  });

  document.getElementById('modalCancel').addEventListener('click', () => {
    modal.style.display = 'none';
    activeEl = null;
  });

  modalInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('modalSave').click();
    if (e.key === 'Escape') document.getElementById('modalCancel').click();
  });
</script>
</body>
</html>
